name: Android AAB (Play Store)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ── Release keystore ─────────────────────────────────────────────────────
      # First run (no secret): generates a keystore, prints its base64 in logs.
      # Copy that base64 value → GitHub repo Settings → Secrets → Actions →
      # New secret named RELEASE_KEYSTORE_BASE64.
      # The passwords default to "legend123" — change via KEYSTORE_PASSWORD /
      # KEY_PASSWORD secrets if you want something different.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Restore or create release keystore
        run: |
          mkdir -p /tmp/keystore
          KS=/tmp/keystore/release.keystore
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$KS"
            echo "Using stored release keystore from secret."
          else
            keytool -genkeypair -v \
              -keystore "$KS" \
              -storepass legend123 \
              -alias legend-release \
              -keypass legend123 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Legend Delivery,O=Legend,C=SA" \
              -noprompt
            echo ""
            echo "========================================================="
            echo "  IMPORTANT: No RELEASE_KEYSTORE_BASE64 secret found."
            echo "  Copy the base64 string below and save it as a GitHub"
            echo "  secret named RELEASE_KEYSTORE_BASE64. Every future"
            echo "  release MUST be signed with the same key — if you lose"
            echo "  it, you cannot update the app on the Play Store."
            echo "========================================================="
            base64 -w 0 "$KS"
            echo ""
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci || npm install

      - name: Build web (Vite)
        run: npm run build

      - name: Remove existing android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Force compile/target SDK 35
        run: |
          if [ -f android/variables.gradle ]; then
            sed -i 's/compileSdkVersion = [0-9]\+/compileSdkVersion = 35/' android/variables.gradle
            sed -i 's/targetSdkVersion = [0-9]\+/targetSdkVersion = 35/' android/variables.gradle
          fi

      - name: Suppress unsupported compileSdk warning
        run: echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties

      - name: Ensure CAMERA permission
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.CAMERA" />' "$MANIFEST"

      - name: Configure release signing
        run: |
          KS=/tmp/keystore/release.keystore
          STOREPASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KEYPASS="${{ secrets.KEY_PASSWORD }}"
          # Fall back to default password if secrets not set
          [ -z "$STOREPASS" ] && STOREPASS="legend123"
          [ -z "$KEYPASS" ]   && KEYPASS="legend123"

          cat >> android/app/build.gradle << EOF

          android.signingConfigs {
            release {
              storeFile file("$KS")
              storePassword "$STOREPASS"
              keyAlias "legend-release"
              keyPassword "$KEYPASS"
            }
          }
          android.buildTypes.release.signingConfig android.signingConfigs.release
          EOF

      - name: Build release AAB + APK
        working-directory: android
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
